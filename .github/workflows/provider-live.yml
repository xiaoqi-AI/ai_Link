name: Provider Live Verification

on:
  workflow_dispatch:
    inputs:
      strict:
        description: "Fail when configured provider secrets are missing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  verify-providers:
    name: Verify providers
    runs-on: ubuntu-latest
    env:
      OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Dry-run all providers
        run: npm run providers:dry

      - name: Live verify configured providers
        if: ${{ inputs.strict == 'false' }}
        run: npm run providers:live

      - name: Strict live verify configured providers
        if: ${{ inputs.strict == 'true' }}
        run: npm run providers:live -- --strict
