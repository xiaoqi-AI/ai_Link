name: Provider Live Verification

on:
  workflow_dispatch:
    inputs:
      strict:
        description: "Fail when configured provider secrets are missing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  verify-providers:
    name: Verify providers
    runs-on: ubuntu-latest
    environment: provider-live

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Dry-run all providers
        run: npm run providers:dry

      - name: Get OpenAI-compatible key from Bitwarden
        if: ${{ vars.BWS_OPENAI_COMPATIBLE_API_KEY_SECRET_ID != '' }}
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            ${{ vars.BWS_OPENAI_COMPATIBLE_API_KEY_SECRET_ID }} > OPENAI_COMPATIBLE_API_KEY

      - name: Get DeepSeek key from Bitwarden
        if: ${{ vars.BWS_DEEPSEEK_API_KEY_SECRET_ID != '' }}
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            ${{ vars.BWS_DEEPSEEK_API_KEY_SECRET_ID }} > DEEPSEEK_API_KEY

      - name: Get Kimi key from Bitwarden
        if: ${{ vars.BWS_MOONSHOT_API_KEY_SECRET_ID != '' }}
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            ${{ vars.BWS_MOONSHOT_API_KEY_SECRET_ID }} > MOONSHOT_API_KEY

      - name: Get Grok key from Bitwarden
        if: ${{ vars.BWS_XAI_API_KEY_SECRET_ID != '' }}
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            ${{ vars.BWS_XAI_API_KEY_SECRET_ID }} > XAI_API_KEY

      - name: Live verify configured providers
        if: ${{ inputs.strict == 'false' }}
        run: npm run providers:live

      - name: Strict live verify configured providers
        if: ${{ inputs.strict == 'true' }}
        run: npm run providers:live -- --strict
