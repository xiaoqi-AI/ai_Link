name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Validate AI Link config
        run: npm run ai-link -- config validate

      - name: Dry-run provider verification
        run: npm run providers:dry

      - name: Security scan
        run: npm run security:scan

      - name: Package contents
        run: npm run package:check

      - name: Package install smoke
        run: npm run package:install-smoke

      - name: GitHub repository safety baseline
        run: npm run github:safety
        env:
          AI_LINK_GITHUB_SAFETY_DISABLE_REMOTE: "1"

      - name: Release plan
        run: npm run release:plan

      - name: Release readiness
        run: npm run release:readiness

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
