version: 1

routes:
  auto_ops.research:
    provider: grok
    fallback:
      - deepseek
      - kimi
      - mock
    capabilities:
      - web_research
      - text

  auto_ops.article_draft:
    provider: kimi
    fallback:
      - deepseek
      - mock
    capabilities:
      - long_context
      - text

  auto_ops.agent_flow:
    provider: coze
    capabilities:
      - agent_workflow
    fallback:
      - mock

workflows:
  auto_ops:
    description: Research with Grok, draft with Kimi, then run the configured agent workflow while Codex keeps execution control.
    stages:
      - name: research
        task: auto_ops.research
        inputFrom: original
      - name: article_draft
        task: auto_ops.article_draft
        inputFrom: original-and-previous
      - name: agent_flow
        task: auto_ops.agent_flow
        inputFrom: original-and-previous
        approval:
          required: true
          mode: live
          reason: Agent workflow stages may call external tools or platform automations.

providers:
  coze:
    type: coze
    model: coze-agent-workflow
    capabilities:
      - agent_workflow

policies:
  default:
    blockSensitive: true
    allowOutbound: user-approved
