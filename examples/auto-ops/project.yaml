version: 1

routes:
  auto_ops.research:
    provider: grok
    fallback:
      - deepseek
      - kimi
      - mock
    capabilities:
      - web_research
      - text

  auto_ops.article_draft:
    provider: kimi
    fallback:
      - deepseek
      - mock
    capabilities:
      - long_context
      - text

  auto_ops.agent_flow:
    provider: mock
    capabilities:
      - agent_workflow

workflows:
  auto_ops:
    description: Research with Grok, then draft with Kimi while Codex keeps execution control.
    stages:
      - name: research
        task: auto_ops.research
        inputFrom: original
      - name: article_draft
        task: auto_ops.article_draft
        inputFrom: original-and-previous

policies:
  default:
    blockSensitive: true
    allowOutbound: user-approved
