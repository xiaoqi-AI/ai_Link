services:
  - type: web
    name: ai-link-auth-hub
    runtime: node
    plan: starter
    numInstances: 1
    buildCommand: npm ci
    startCommand: npm start
    autoDeployTrigger: checksPass
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_LINK_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-link-postgres
          property: connectionString
      - key: AI_LINK_APP_PASSWORD
        sync: false
      - key: AI_LINK_SESSION_SECRET
        sync: false
      - key: AI_LINK_SESSION_MAX_AGE_SECONDS
        value: "28800"
      - key: AI_LINK_CSRF_TOKEN_TTL_SECONDS
        value: "900"
      - key: AI_LINK_LOGIN_MAX_FAILURES
        value: "5"
      - key: AI_LINK_LOGIN_WINDOW_SECONDS
        value: "900"
      - key: AI_LINK_LOGIN_BLOCK_SECONDS
        value: "900"
      - key: AI_LINK_LOGIN_MAX_KEYS
        value: "1000"
      - key: AI_LINK_ADMIN_TOKEN
        sync: false
      - key: AI_LINK_EXECUTOR_TOKEN
        sync: false
      - key: AI_LINK_EXECUTOR_ID
        sync: false
      - key: AI_LINK_EXECUTOR_HEARTBEAT_TTL_MS
        value: "60000"
      - key: AI_LINK_CONNECTOR_PROBE_TTL_MS
        value: "900000"
      - key: AI_LINK_ARTIFACT_RETENTION_DAYS
        value: "7"
      - key: AI_LINK_APPROVAL_RETENTION_DAYS
        value: "7"
      - key: AI_LINK_AUDIT_RETENTION_DAYS
        value: "180"
      - key: AI_LINK_MAINTENANCE_AUDIT_RETENTION_DAYS
        value: "365"
      - key: AI_LINK_HEARTBEAT_RETENTION_GRACE_HOURS
        value: "24"
      - key: AI_LINK_PROBE_RETENTION_GRACE_DAYS
        value: "7"
      - key: AI_LINK_RETENTION_MAX_ROWS_PER_TABLE
        value: "500"
      - key: AI_LINK_CODEX_TOKEN
        sync: false
      - key: AI_LINK_CODEX_SCOPES
        value: "tasks:create,tasks:read,connectors:read,audit:write"
      - key: AI_LINK_REQUIRE_CLOUDFLARE_ACCESS
        value: "true"
      - key: AI_LINK_ALLOWED_ACCESS_EMAILS
        sync: false
      - key: AI_LINK_CLOUDFLARE_ACCESS_ALLOW_SERVICE_TOKEN
        sync: false
      - key: AI_LINK_CLOUDFLARE_ACCESS_AUD
        sync: false
      - key: AI_LINK_CLOUDFLARE_TEAM_DOMAIN
        sync: false

databases:
  - name: ai-link-postgres
    plan: basic-256mb
    ipAllowList: []
