services:
  - type: web
    name: ai-link-auth-hub
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_LINK_BASE_URL
        value: https://voice.xiao-qi-ai.com
      - key: DATABASE_URL
        fromDatabase:
          name: ai-link-postgres
          property: connectionString
      - key: AI_LINK_APP_PASSWORD
        sync: false
      - key: AI_LINK_SESSION_SECRET
        sync: false
      - key: AI_LINK_ADMIN_TOKEN
        sync: false
      - key: AI_LINK_EXECUTOR_TOKEN
        sync: false
      - key: AI_LINK_CODEX_TOKEN
        sync: false

databases:
  - name: ai-link-postgres
    plan: starter
